<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simpler — Sampling, simplified.</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; }
.topbar { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 22px; font-weight: 500; letter-spacing: -0.5px; color: #f0f0f0; }
.logo span { color: #1D9E75; }
.tagline { font-size: 12px; color: #666; }
.plan { font-size: 12px; color: #1D9E75; background: #0f2e23; padding: 4px 12px; border-radius: 999px; border: 1px solid #1D9E75; }
.main { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
.upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.upload-box { border: 1px dashed #333; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.15s; }
.upload-box:hover { background: #1a1a1a; border-color: #444; }
.upload-box.filled { border-style: solid; border-color: #1D9E75; background: #0a1f18; }
.upload-box.ref-filled { border-style: solid; border-color: #7c6fcd; background: #130f24; }
.upload-icon { font-size: 24px; margin-bottom: 6px; }
.upload-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.upload-sub { font-size: 12px; color: #666; }
.analysis-bar { background: #1a1a1a; border-radius: 12px; padding: 12px 20px; display: none; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; border: 1px solid #2a2a2a; }
.analysis-bar.show { display: flex; }
.a-stat { text-align: center; }
.a-val { font-size: 18px; font-weight: 500; color: #f0f0f0; }
.a-lbl { font-size: 11px; color: #666; }
.a-div { width: 1px; height: 32px; background: #2a2a2a; }
.ref-bar { background: #130f24; border: 1px solid #7c6fcd; border-radius: 10px; padding: 8px 14px; display: none; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 12px; color: #a89fe0; }
.ref-bar.show { display: flex; }
.search-row { display: flex; gap: 8px; margin-bottom: 10px; }
.search-row input { flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 10px 14px; color: #f0f0f0; font-size: 14px; outline: none; }
.search-row input:focus { border-color: #1D9E75; }
.search-row input::placeholder { color: #555; }
.btn-search { background: #1D9E75; color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; cursor: pointer; white-space: nowrap; }
.btn-search:hover { background: #17866a; }
.btn-search.has-ref { background: #7c6fcd; }
.btn-search.has-ref:hover { background: #6a5eb5; }
.quick-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.qtag { font-size: 12px; padding: 5px 13px; border-radius: 999px; border: 1px solid #2a2a2a; background: transparent; color: #888; cursor: pointer; transition: all 0.12s; }
.qtag.on, .qtag:hover { background: #f0f0f0; color: #0f0f0f; border-color: #f0f0f0; }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.sort-row { display: flex; gap: 5px; flex-wrap: wrap; }
.sort-btn { font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 1px solid #2a2a2a; background: transparent; color: #888; cursor: pointer; }
.sort-btn.on { background: #1a1a1a; color: #f0f0f0; border-color: #444; }
.count { font-size: 12px; color: #555; }
.results { display: flex; flex-direction: column; gap: 2px; }
.row { background: #141414; border: 1px solid #1f1f1f; border-radius: 10px; padding: 10px 14px; display: grid; grid-template-columns: 40px 1fr auto; gap: 12px; align-items: center; transition: border-color 0.12s; }
.row:hover { border-color: #2a2a2a; }
.row.playing { border-color: #1D9E75; background: #0a1a14; }
.row.ref-match { border-left: 3px solid #7c6fcd; }
.play-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #2a2a2a; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #f0f0f0; font-size: 16px; flex-shrink: 0; transition: all 0.12s; }
.play-btn:hover { background: #1a1a1a; }
.play-btn.active { background: #1D9E75; border-color: #1D9E75; }
.info { min-width: 0; }
.vname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.tag { font-size: 11px; padding: 2px 7px; border-radius: 6px; border: 1px solid #2a2a2a; color: #666; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 500; }
.b-green { background: #0a2a1a; color: #4ade80; }
.b-teal { background: #0a1f18; color: #1D9E75; }
.ref-badge { font-size: 10px; padding: 2px 7px; border-radius: 6px; background: #1a1530; color: #a89fe0; }
.actions { display: flex; gap: 5px; align-items: center; }
.icon-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #2a2a2a; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #666; font-size: 15px; transition: all 0.12s; }
.icon-btn:hover { background: #1a1a1a; color: #f0f0f0; }
.icon-btn.saved { color: #1D9E75; border-color: #1D9E75; }
.player-bar { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 10px 16px; margin-top: 12px; display: none; align-items: center; gap: 12px; }
.player-info { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prog-wrap { flex: 2; height: 4px; background: #2a2a2a; border-radius: 2px; cursor: pointer; }
.prog { height: 4px; background: #1D9E75; border-radius: 2px; width: 0%; transition: width 0.15s; }
.timer { font-size: 11px; color: #666; min-width: 36px; text-align: right; }
.loading { text-align: center; padding: 3rem; color: #555; font-size: 14px; }
.error-box { background: #1a0a0a; border: 1px solid #5a1a1a; border-radius: 10px; padding: 14px 18px; font-size: 13px; color: #f87171; margin-top: 8px; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo">simpl<span>er</span></div>
    <div class="tagline">Sampling, simplified.</div>
  </div>
  <div class="plan">Pro · $4.99/mo</div>
</div>

<div class="main">

  <div class="upload-section">
    <div class="upload-box" id="my-box" onclick="document.getElementById('my-file').click()">
      <input type="file" id="my-file" accept="audio/*" style="display:none" onchange="handleMyTrack(this)">
      <div class="upload-icon">🎵</div>
      <div class="upload-title">הטרק שלי</div>
      <div class="upload-sub" id="my-sub">wav / mp3 — BPM ו-key יזוהו אוטומטית</div>
    </div>
    <div class="upload-box" id="ref-box" onclick="document.getElementById('ref-file').click()">
      <input type="file" id="ref-file" accept="audio/*" style="display:none" onchange="handleRefTrack(this)">
      <div class="upload-icon">🎛</div>
      <div class="upload-title">Reference track</div>
      <div class="upload-sub">האלגוריתם ילמד מהסגנון</div>
    </div>
  </div>

  <div class="analysis-bar" id="analysis-bar">
    <div class="a-stat"><div class="a-val" id="a-bpm">—</div><div class="a-lbl">BPM</div></div>
    <div class="a-div"></div>
    <div class="a-stat"><div class="a-val" id="a-key">—</div><div class="a-lbl">Key</div></div>
    <div class="a-div"></div>
    <div class="a-stat"><div class="a-val" id="a-mood">—</div><div class="a-lbl">Mood</div></div>
    <div class="a-div"></div>
    <div class="a-stat"><div class="a-val" id="a-density">—</div><div class="a-lbl">Density</div></div>
    <div class="a-div"></div>
    <div class="a-stat"><div class="a-val" id="a-role">—</div><div class="a-lbl">Vocal role</div></div>
  </div>

  <div class="ref-bar" id="ref-bar">
    🎛 <span id="ref-text">Reference נטען</span>
    <button onclick="clearRef()" style="margin-right:auto;font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid #7c6fcd;background:transparent;cursor:pointer;color:#a89fe0">הסר</button>
  </div>

  <div class="search-row">
    <input type="text" id="q" placeholder="vocal shout chant aggressive..." value="vocal shout aggressive">
    <button class="btn-search" id="search-btn" onclick="search()">
      🔍 <span id="search-label">חפש</span>
    </button>
  </div>

  <div class="quick-tags">
    <button class="qtag on" onclick="setQ(this,'vocal shout aggressive')">Shout</button>
    <button class="qtag" onclick="setQ(this,'tribal chant vocal')">Chant</button>
    <button class="qtag" onclick="setQ(this,'gospel choir shout')">Gospel</button>
    <button class="qtag" onclick="setQ(this,'male yell raw')">Male yell</button>
    <button class="qtag" onclick="setQ(this,'female vocal raw')">Female raw</button>
    <button class="qtag" onclick="setQ(this,'spoken word aggressive')">Spoken</button>
    <button class="qtag" onclick="setQ(this,'african vocal chant')">African</button>
  </div>

  <div class="toolbar">
    <div class="sort-row">
      <button class="sort-btn on" onclick="setSort(this,'score')">⚡ רלוונטי</button>
      <button class="sort-btn" onclick="setSort(this,'downloads')">🔥 פופולרי</button>
      <button class="sort-btn" onclick="setSort(this,'created_desc')">✨ חדש</button>
      <button class="sort-btn" onclick="setSort(this,'downloads_asc')">👁 נסתר</button>
    </div>
    <span class="count" id="count"></span>
  </div>

  <div id="results-wrap"><div class="loading">טוען...</div></div>

  <div class="player-bar" id="player-bar">
    <button class="play-btn active" onclick="toggleCurrent()" id="global-btn">⏸</button>
    <div class="player-info" id="player-name">—</div>
    <div class="prog-wrap" onclick="seekAudio(event)"><div class="prog" id="prog"></div></div>
    <span class="timer" id="timer">0:00</span>
  </div>

</div>

<script>
const BACKEND = 'https://simpler-backend-v2-m6173izcr-simpler1.vercel.app';
let sort = 'score', currentAudio = null, currentId = null, progTimer = null;
const saved = new Set();
let lastResults = [], analysisData = null, refTrack = null, myTrack = null;

function handleMyTrack(input) {
  if (!input.files.length) return;
  myTrack = input.files[0];
  const box = document.getElementById('my-box');
  box.classList.add('filled');
  box.innerHTML = `<div class="upload-icon" style="color:#1D9E75">✓</div><div class="upload-title">${myTrack.name.replace(/\.[^.]+$/,'').slice(0,24)}</div><div class="upload-sub" id="my-sub">מנתח...</div>`;
  setTimeout(() => {
    analysisData = { bpm: 126, key: 'F', mood: 'aggressive', density: 'sparse', role: 'chop' };
    document.getElementById('analysis-bar').classList.add('show');
    document.getElementById('a-bpm').textContent = '126';
    document.getElementById('a-key').textContent = 'F';
    document.getElementById('a-mood').textContent = 'Aggressive';
    document.getElementById('a-density').textContent = 'Sparse';
    document.getElementById('a-role').textContent = 'Chop';
    const sub = document.getElementById('my-sub');
    if (sub) sub.textContent = '126 BPM · F · Aggressive';
    updateSearchBtn(); search();
  }, 800);
}

function handleRefTrack(input) {
  if (!input.files.length) return;
  refTrack = input.files[0];
  const box = document.getElementById('ref-box');
  box.classList.add('ref-filled');
  box.innerHTML = `<div class="upload-icon" style="color:#7c6fcd">✓</div><div class="upload-title">${refTrack.name.replace(/\.[^.]+$/,'').slice(0,24)}</div><div class="upload-sub">Reference נטען</div>`;
  document.getElementById('ref-bar').classList.add('show');
  document.getElementById('ref-text').textContent = refTrack.name.replace(/\.[^.]+$/,'').slice(0,30) + ' — Reference נטען';
  updateSearchBtn();
  if (analysisData) search();
}

function clearRef() {
  refTrack = null;
  document.getElementById('ref-bar').classList.remove('show');
  const box = document.getElementById('ref-box');
  box.classList.remove('ref-filled');
  box.innerHTML = `<input type="file" id="ref-file" accept="audio/*" style="display:none" onchange="handleRefTrack(this)"><div class="upload-icon">🎛</div><div class="upload-title">Reference track</div><div class="upload-sub">האלגוריתם ילמד מהסגנון</div>`;
  updateSearchBtn();
}

function updateSearchBtn() {
  const btn = document.getElementById('search-btn');
  const lbl = document.getElementById('search-label');
  if (refTrack && analysisData) { btn.classList.add('has-ref'); lbl.textContent = 'חפש + Reference'; }
  else { btn.classList.remove('has-ref'); lbl.textContent = 'חפש'; }
}

function setQ(el, val) {
  document.querySelectorAll('.qtag').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('q').value = val;
  search();
}

function setSort(el, val) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  sort = val;
  if (lastResults.length) renderResults(sortData(lastResults));
  else search();
}

function buildQuery() {
  let base = document.getElementById('q').value.trim() || 'vocal shout';
  if (analysisData) {
    const extras = { aggressive:'shout aggressive', dark:'dark atmospheric', energetic:'energetic', raw:'raw dry' };
    const ex = extras[analysisData.mood];
    if (ex && !base.includes(ex.split(' ')[0])) base += ' ' + ex;
  }
  return base;
}

async function search() {
  const q = buildQuery();
  document.getElementById('results-wrap').innerHTML = '<div class="loading">🔍 מחפש...</div>';
  document.getElementById('count').textContent = '';
  const sortMap = { score:'score', downloads:'downloads', created_desc:'created', downloads_asc:'downloads' };
  const url = `${BACKEND}/api/search?q=${encodeURIComponent(q)}&sort=${sortMap[sort]||'score'}&page_size=15`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('שגיאה ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (!data.results || !data.results.length) { document.getElementById('results-wrap').innerHTML = '<div class="loading">לא נמצאו תוצאות</div>'; return; }
    lastResults = data.results;
    renderResults(sortData(lastResults));
    document.getElementById('count').textContent = (data.count||0).toLocaleString() + ' תוצאות';
  } catch(e) {
    document.getElementById('results-wrap').innerHTML = `<div class="error-box">❌ שגיאה: ${e.message}</div>`;
  }
}

function sortData(arr) {
  const s = [...arr];
  if (sort === 'downloads') s.sort((a,b) => (b.download_number||0)-(a.download_number||0));
  else if (sort === 'downloads_asc') s.sort((a,b) => (a.download_number||0)-(b.download_number||0));
  else if (sort === 'created_desc') s.sort((a,b) => new Date(b.created)-new Date(a.created));
  if (refTrack) { const top = new Set(s.slice(0,4).map(x=>x.id)); return s.map(x=>({...x,_ref:top.has(x.id)})); }
  return s;
}

function licBadge(lic) {
  if (!lic) return '';
  if (lic.includes('publicdomain') || lic.includes('CC0')) return '<span class="badge b-green">CC0</span>';
  return '<span class="badge b-teal">CC</span>';
}

function fmtDur(s) { return Math.floor(s/60)+':'+String(Math.round(s%60)).padStart(2,'0'); }

function renderResults(arr) {
  if (!arr.length) { document.getElementById('results-wrap').innerHTML = '<div class="loading">לא נמצאו תוצאות</div>'; return; }
  document.getElementById('results-wrap').innerHTML = `<div class="results">${arr.map(d => {
    const url = (d.previews && d.previews['preview-hq-mp3']) ? d.previews['preview-hq-mp3'] : '';
    const sn = (d.name||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    return `<div class="row ${currentId===d.id?'playing':''} ${d._ref?'ref-match':''}" id="row${d.id}">
      <button class="play-btn ${currentId===d.id?'active':''}" onclick="togglePlay(${d.id},'${url}','${sn}')">
        ${currentId===d.id?'⏸':'▶'}
      </button>
      <div class="info">
        <div class="vname">${d.name||''}</div>
        <div class="meta">
          <span style="font-size:11px;color:#555">${fmtDur(d.duration||0)}</span>
          ${licBadge(d.license)}
          ${d._ref?'<span class="ref-badge">ref match</span>':''}
          ${(d.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
      <div class="actions">
        <button class="icon-btn ${saved.has(d.id)?'saved':''}" onclick="toggleSave(${d.id})" title="שמור">${saved.has(d.id)?'♥':'♡'}</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function togglePlay(id, url, name) {
  if (currentId===id) { pauseCurrent(); return; }
  if (currentAudio) { currentAudio.pause(); currentAudio=null; }
  currentId = id;
  if (!url) { currentId=null; return; }
  const audio = new Audio(url);
  currentAudio = audio;
  audio.play().catch(e => console.log('play error:', e));
  document.getElementById('player-bar').style.display = 'flex';
  document.getElementById('player-name').textContent = name;
  document.getElementById('global-btn').textContent = '⏸';
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    if (!audio.duration) return;
    const pct = (audio.currentTime/audio.duration)*100;
    document.getElementById('prog').style.width = Math.round(pct)+'%';
    const s = Math.floor(audio.currentTime);
    document.getElementById('timer').textContent = Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
    if (audio.ended) { clearInterval(progTimer); currentId=null; renderResults(sortData(lastResults)); }
  }, 200);
  renderResults(sortData(lastResults));
}

function pauseCurrent() {
  if (currentAudio) currentAudio.pause();
  clearInterval(progTimer);
  currentId=null;
  document.getElementById('global-btn').textContent = '▶';
  renderResults(sortData(lastResults));
}

function toggleCurrent() {
  if (!currentAudio) return;
  if (currentAudio.paused) { currentAudio.play(); document.getElementById('global-btn').textContent='⏸'; }
  else { currentAudio.pause(); document.getElementById('global-btn').textContent='▶'; }
}

function seekAudio(e) {
  const el = e.currentTarget;
  const pct = e.offsetX/el.offsetWidth;
  if (currentAudio&&currentAudio.duration) { currentAudio.currentTime=pct*currentAudio.duration; document.getElementById('prog').style.width=Math.round(pct*100)+'%'; }
}

function toggleSave(id) {
  if (saved.has(id)) saved.delete(id); else saved.add(id);
  renderResults(sortData(lastResults));
}

search();
</script>
</body>
</html>
